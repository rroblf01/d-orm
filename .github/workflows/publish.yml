name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # ── Run tests before publishing ────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Run tests
        # Run tests sequentially (no ``-n 4``) for the publish-time
        # gate: parallel execution surfaces a Python-3.14 +
        # psycopg-pool finalisation race that occasionally takes an
        # xdist worker down with a SIGSEGV. The crash is a
        # destructor-vs-event-loop ordering issue we can't fully
        # suppress from pure-Python code; it only manifests under
        # high concurrency. Sequential mode is ~3-4× slower but
        # bulletproof — fine for a release-time gate that runs once
        # per tag. Day-to-day test.yml keeps the parallel runner
        # because the worker-restart escape hatch handles the same
        # race well enough for fast feedback.
        run: uv run pytest --tb=short -q

  # ── Build source distribution and wheel ───────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI via Trusted Publisher (no token needed) ───────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # matches the environment configured on PyPI
    permissions:
      id-token: write          # required for OIDC (Trusted Publisher)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
