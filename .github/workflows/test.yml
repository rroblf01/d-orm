name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Cancel any in-flight runs of this workflow for the same ref
# (branch on a push, PR head on a pull_request). A second push or
# a force-push that lands while the previous run is still going
# tears down the older run instead of letting both burn minutes
# on identical-but-stale code. ``github.workflow`` keeps the scope
# tied to *this* workflow so the docs / publish workflows aren't
# touched.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / PG 16
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    services:
      # Real Postgres so the postgres-parametrized tests actually run in CI.
      # Without this the conftest's `_docker_available()` check would skip
      # them silently on hosted runners that don't expose a docker daemon.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # MySQL 8 for the mysql-parametrized tests (3.1 ships a real backend).
      # ``mysql_native_password`` is the auth plugin pymysql understands
      # without extra config; the default ``caching_sha2_password`` needs
      # extra round-trips and a public-key fetch that flakes on cold runners.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: dorm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # Tell conftest to use this service container directly instead of
      # spawning a testcontainer (faster + more reliable in CI).
      DORM_TEST_POSTGRES_HOST: localhost
      DORM_TEST_POSTGRES_PORT: 5432
      DORM_TEST_POSTGRES_USER: postgres
      DORM_TEST_POSTGRES_PASSWORD: postgres
      DORM_TEST_POSTGRES_DB: dorm_test
      DORM_TEST_MYSQL_HOST: 127.0.0.1
      DORM_TEST_MYSQL_PORT: 3306
      DORM_TEST_MYSQL_USER: root
      DORM_TEST_MYSQL_PASSWORD: mysql
      DORM_TEST_MYSQL_DB: dorm_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Add swap
        # Hosted runners ship with 7GB RAM and the suite + PG service
        # + 2 xdist workers occasionally trip the OOM killer, leaving
        # `worker 'gwN' crashed` flakes. Swap absorbs the spikes.
        # Runners already ship with an active /swapfile, so we replace
        # it with a larger one rather than creating a fresh path.
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile /swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Type check
        run: uv run ty check

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        # --cov-fail-under floors the line-coverage at the current level
        # so accidental drops break CI. Raise the number whenever you
        # add tests; never silently lower it.
        # --max-worker-restart lets xdist resurrect a worker the OOM
        # killer took out instead of dropping its coverage data and
        # tanking the whole run.
        run: uv run pytest -n 2 --max-worker-restart=3 --tb=short -q --cov=dorm --cov-fail-under=83

  # Catch PG-version-specific behavior (advisory locks, IDENTITY columns,
  # syntax differences) by running the suite against the supported range.
  # Latest Python only — Python compat is covered by the matrix above.
  pg-matrix:
    name: PG ${{ matrix.postgres-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover only the currently-supported Postgres releases — the
        # main ``test`` job above pins PG 16 (the LTS-style middle
        # of the road), and this matrix covers the two flanking
        # majors that real users are likely to be on. Older majors
        # (13 / 14 / 15) are out of upstream community support and
        # the matrix grew expensive enough to trip the runner OOM
        # killer on parallel pytest workers.
        postgres-version: ["17-alpine", "18-alpine"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DORM_TEST_POSTGRES_HOST: localhost
      DORM_TEST_POSTGRES_PORT: 5432
      DORM_TEST_POSTGRES_USER: postgres
      DORM_TEST_POSTGRES_PASSWORD: postgres
      DORM_TEST_POSTGRES_DB: dorm_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Add swap
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile /swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Run tests
        # --cov-fail-under floors the line-coverage at the current level
        # so accidental drops break CI. Raise the number whenever you
        # add tests; never silently lower it.
        run: uv run pytest -n 2 --max-worker-restart=3 --tb=short -q --cov=dorm --cov-fail-under=83
