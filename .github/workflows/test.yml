name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Cancel any in-flight runs of this workflow for the same ref
# (branch on a push, PR head on a pull_request). A second push or
# a force-push that lands while the previous run is still going
# tears down the older run instead of letting both burn minutes
# on identical-but-stale code. ``github.workflow`` keeps the scope
# tied to *this* workflow so the docs / publish workflows aren't
# touched.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # SQLite-only matrix — fastest to spin up, runs against every
  # supported Python version. Doubles as the lint / type-check gate
  # since those don't depend on a real DB service.
  sqlite:
    name: SQLite / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cap concurrent matrix legs at 3 — keeps total in-flight
      # runners under the free-tier comfort window and gives each
      # leg the memory headroom needed for ``pytest -n 4`` without
      # tripping the OOM killer.
      max-parallel: 3
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Type check
        run: uv run ty check

      - name: Lint
        run: uv run ruff check .

      - name: Run tests (SQLite only)
        # No ``DORM_TEST_POSTGRES_HOST`` exported → conftest's
        # ``_backends()`` returns ``["sqlite"]`` (Postgres + MySQL
        # parametrization both gated on env vars). The full suite
        # runs against the SQLite parametrisation only on this job.
        run: uv run pytest -n 4 --max-worker-restart=3 --tb=short -q --cov=dorm --cov-fail-under=83

  # Postgres matrix — pinned PG 16 (LTS-style middle-of-the-road)
  # plus the two flanking majors most production users run. Runs
  # only on Python 3.14 (Python compat is covered by the SQLite
  # job above).
  postgres:
    name: PostgreSQL ${{ matrix.postgres-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cap concurrent matrix legs at 3 — keeps total in-flight
      # runners under the free-tier comfort window and gives each
      # leg the memory headroom needed for ``pytest -n 4`` without
      # tripping the OOM killer.
      max-parallel: 3
      matrix:
        postgres-version: ["16-alpine", "17-alpine", "18-alpine"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # ``DORM_TEST_POSTGRES_HOST`` switches conftest's ``_backends()``
      # to ``["sqlite", "postgres"]`` — every parametrised test runs
      # twice, once against each backend. The SQLite leg here is
      # cheap (in-memory file) and catches "broke SQLite while
      # fixing PG" regressions in the same job.
      DORM_TEST_POSTGRES_HOST: localhost
      DORM_TEST_POSTGRES_PORT: 5432
      DORM_TEST_POSTGRES_USER: postgres
      DORM_TEST_POSTGRES_PASSWORD: postgres
      DORM_TEST_POSTGRES_DB: dorm_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Add swap
        # Hosted runners ship with 7GB RAM; the suite + PG service
        # + 2 xdist workers occasionally trip the OOM killer,
        # leaving ``worker 'gwN' crashed`` flakes. Swap absorbs the
        # spikes. Runners already ship with an active /swapfile, so
        # we replace it with a larger one rather than creating a
        # fresh path.
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile /swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Run tests (PG + SQLite parametrised)
        # --cov-fail-under floors the line-coverage at the current
        # level so accidental drops break CI. Raise the number
        # whenever you add tests; never silently lower it.
        # --max-worker-restart lets xdist resurrect a worker the
        # OOM killer took out instead of dropping its coverage data
        # and tanking the whole run.
        run: uv run pytest -n 4 --max-worker-restart=3 --tb=short -q --cov=dorm --cov-fail-under=83

  # Dedicated MySQL job — the 3.1 backend is younger than the PG /
  # SQLite paths and several test files hard-code vendor-specific
  # DDL strings (``BIGSERIAL``, ``INTEGER PRIMARY KEY AUTOINCREMENT``)
  # that don't translate cleanly. Run only the focused MySQL-aware
  # subset here. As the backend matures and tests get vendor-aware
  # DDL helpers, expand the include list.
  mysql:
    name: MySQL ${{ matrix.mysql-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cap concurrent matrix legs at 3 — keeps total in-flight
      # runners under the free-tier comfort window and gives each
      # leg the memory headroom needed for ``pytest -n 4`` without
      # tripping the OOM killer.
      max-parallel: 3
      matrix:
        mysql-version: ["8.0", "8.4"]

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: dorm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DORM_TEST_MYSQL_HOST: 127.0.0.1
      DORM_TEST_MYSQL_PORT: 3306
      DORM_TEST_MYSQL_USER: root
      DORM_TEST_MYSQL_PASSWORD: mysql
      DORM_TEST_MYSQL_DB: dorm_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra=all

      - name: Run MySQL-aware tests
        # The MySQL parametrization runs across the full suite, but
        # only the MySQL-aware test files are stable today. The rest
        # of the suite hard-codes vendor DDL (``BIGSERIAL``, etc.)
        # that the autodetector / synthetic models pick up on PG +
        # SQLite. Until those tests get vendor-aware helpers
        # (planned for v3.2), gate the MySQL CI run to the focused
        # subset below — anything failing here is a real backend
        # regression rather than a pre-existing test-shape
        # mismatch.
        run: |
          uv run pytest -n 4 --max-worker-restart=3 --tb=short -q \
            tests/test_v3_1_audit_fixes.py \
            tests/test_v3_1_release.py::test_reverse_fk_filter_emits_left_join \
            tests/test_v3_1_release.py::test_reverse_fk_count_aggregate \
            tests/test_v3_1_release.py::test_manager_using_shortcut_returns_queryset_bound_to_alias \
            tests/test_v3_1_more_features.py::test_reverse_fk_manager_get_or_create_injects_fk \
            tests/test_v3_1_more_features.py::test_reverse_fk_manager_add_bulk_updates_fk_column
