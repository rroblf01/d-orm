      - What's new in 4.1: v4_1.md
      - What's new in 4.0: v4_0.md
      - Upgrading from 3.3 to 4.0: upgrading-to-4.0.md
      - Sibling packages (mypy / pytest): sibling-packages.md
      - Benchmark vs other ORMs: bench.md
  - API Reference:
      - Models & fields: api/models.md
      - QuerySet & Manager: api/queryset.md
      - Transactions: api/transaction.md
      - Signals: api/signals.md
      - Pydantic interop: api/pydantic.md
      - pgvector: api/pgvector.md
      - Connection / health: api/connection.md
      - Auth (User / Group / tokens): api/auth.md
      - Async-call guard: api/asyncguard.md
      - Async-only Model: api/asyncmodel.md
      - Task-affinity pool: api/task_pool.md
      - Field encryption: api/encrypted.md
      - Prometheus metrics: api/prometheus.md
      - Observability collectors: api/observability.md
      - Multi-tenant (schema): api/tenants.md
      - Multi-tenant (row): api/tenants_row.md
      - Cache backends: api/cache.md
      - Migration linter: api/migrations_lint.md
      - Query budget: api/budget.md
      - Tree / recursive CTEs: api/tree.md
      - Streaming serialisers: api/streaming.md
      - Bulk COPY: api/bulk_copy.md
      - LISTEN / NOTIFY: api/listen_notify.md
      - GIS: api/gis.md
      - Circuit breaker: api/circuit_breaker.md
      - Outbox: api/outbox.md
      - Sharding: api/sharding.md
      - Idempotency: api/idempotency.md
      - Lag-aware router: api/lag_router.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
