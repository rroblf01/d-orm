[project]
name = "d-orm"
version = "0.1.0"
description = "A Django-like ORM with synchronous and asynchronous support"
readme = "README.md"
authors = [{ name = "Ricardo Robles", email = "ricardo.r.f@hotmail.com" }]
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["orm", "database", "django", "async", "sql"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Framework :: AsyncIO",
]
dependencies = [
    "aiosqlite>=0.19.0",
]

[project.optional-dependencies]
postgresql = ["psycopg2-binary>=2.9.0", "asyncpg>=0.28.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "pytest-cov>=4.0"]

[project.scripts]
dorm = "dorm.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["dorm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
