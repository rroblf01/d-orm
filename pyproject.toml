[project]
name = "djanorm"
version = "1.0.1"
description = "A Django-like ORM with synchronous and asynchronous support"
readme = "README.md"
authors = [{ name = "Ricardo Robles", email = "ricardo.r.f@hotmail.com" }]
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["orm", "database", "django", "async", "sql"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Database",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
[project.urls]
Homepage = "https://github.com/rroblf01/d-orm/"
Repository = "https://github.com/rroblf01/d-orm/"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ty>=0.0.32",
    "ruff>=0.15.11",
    "testcontainers[postgres]>=4.14.2",
]
sqlite = ["aiosqlite>=0.22.1"]
postgresql = ["psycopg[binary,pool]>=3.3.3"]
all = ["djanorm[dev,sqlite,postgresql]"]

[project.scripts]
dorm = "dorm.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["dorm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
